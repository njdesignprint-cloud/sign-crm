<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NJ Design Print | Mobile Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
  :root {
    --brand: #b8ff00; --bg: #0c0c0e; --side: #141417; --card: #1a1a1e;
    --border: rgba(255,255,255,0.1); --text: #e2e2e7; --muted: #8a8a93;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
    line-height: 1.5; overflow-x: hidden;
  }

  /* --- ESTRUCTURA RESPONSIVA --- */
  .app { display: flex; height: 100vh; flex-direction: row; }

  /* Sidebar para PC / Tab bar para Móvil */
  .sidebar { 
    width: 240px; background: var(--side); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; z-index: 90;
  }

  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { 
      width: 100%; height: 70px; position: fixed; bottom: 0; left: 0;
      flex-direction: row; padding: 0; border-right: none; border-top: 1px solid var(--border);
      justify-content: space-around; align-items: center;
    }
    .brand { display: none; }
    .main { padding: 20px 15px 100px 15px !important; } /* Espacio para la barra inferior */
  }

  .brand { margin-bottom: 40px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; text-align: center; }
  .brand span { color: var(--brand); }

  .nav-item { 
    padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--muted);
    font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; transition: 0.2s;
  }
  .nav-item.active { color: var(--brand); background: rgba(184,255,0,0.1); }

  @media (max-width: 768px) {
    .nav-item { flex-direction: column; gap: 4px; font-size: 10px; padding: 10px; }
    .nav-item span { display: block; }
  }

  /* MAIN CONTENT */
  .main { flex: 1; overflow-y: auto; padding: 40px; }
  .header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
  
  /* CARDS & TABLES */
  .card-table { 
    background: var(--card); border: 1px solid var(--border); border-radius: 15px; 
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  table { width: 100%; border-collapse: collapse; min-width: 500px; }
  th { text-align: left; padding: 15px; font-size: 11px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 15px; font-size: 14px; border-bottom: 1px solid var(--border); }

  /* BOTONES */
  .btn { padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
  .btn-primary { background: var(--brand); color: #000; width: auto; }
  .btn-pdf { background: #333; color: var(--brand); border: 1px solid var(--brand); padding: 6px 12px; font-size: 11px; }

  /* MODALES ADAPTADOS */
  .modal-overlay { 
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); 
    backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 15px;
  }
  .modal-overlay.active { display: flex; }
  .modal { 
    background: var(--side); width: 100%; max-width: 600px; border-radius: 20px; 
    padding: 25px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border);
  }

  .form-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
  .input { 
    width: 100%; background: var(--bg); border: 1px solid var(--border); 
    padding: 14px; border-radius: 12px; color: #fff; font-size: 16px; /* 16px evita zoom en iOS */
  }

  .page { display:none; } .page.active { display:block; }

  #toast { 
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--brand); color: #000; padding: 12px 25px; 
    border-radius: 50px; font-weight: 700; z-index: 2000; display: none;
  }
</style>
</head>
<body>

<div id="toast">Cargando...</div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">NJ <span>Design Print</span></div>
    <div class="nav-item active" onclick="go('dash', this)">🏠 <span>Inicio</span></div>
    <div class="nav-item" onclick="go('clientes', this)">👥 <span>Clientes</span></div>
    <div class="nav-item" onclick="go('ventas', this)">💼 <span>Ventas</span></div>
  </aside>

  <main class="main">
    <div id="p-dash" class="page active">
      <div class="header"><h2>Hola, NJ</h2></div>
      <div style="background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border);">
        <p style="color: var(--muted); font-size: 12px;">CLIENTES REGISTRADOS</p>
        <h1 id="s-cl" style="color: var(--brand); font-size: 40px;">0</h1>
      </div>
    </div>

    <div id="p-clientes" class="page">
      <div class="header">
        <h2>Clientes</h2>
        <button class="btn btn-primary" onclick="showMod('m-cli')">+ Nuevo</button>
      </div>
      <div class="card-table">
        <table>
          <thead><tr><th>Nombre</th><th>WhatsApp</th><th>PDF</th><th>Acción</th></tr></thead>
          <tbody id="t-clientes"></tbody>
        </table>
      </div>
    </div>

    <div id="p-ventas" class="page">
      <div class="header"><h2>Ventas</h2></div>
      <div class="card-table"><table id="t-ventas"></table></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="m-cli">
  <div class="modal">
    <h3>Nuevo Cliente</h3>
    <div class="form-grid">
      <input id="c-nom" class="input" placeholder="Nombre completo">
      <input id="c-emp" class="input" placeholder="Nombre de empresa">
      <input id="c-tel" class="input" placeholder="WhatsApp (Ej: +52...)">
      <input id="c-ciu" class="input" placeholder="Ciudad">
      <textarea id="c-not" class="input" placeholder="Notas extras..." style="height:80px"></textarea>
    </div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeMod()">Cerrar</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveCli()">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAAf9HnAJppIMUx3cz2RdrR2dkgLx8InSI",
    authDomain: "sign-crm-a7bda.firebaseapp.com",
    projectId: "sign-crm-a7bda",
    storageBucket: "sign-crm-a7bda.firebasestorage.app",
    messagingSenderId: "404561016263",
    appId: "1:404561016263:web:ae655261c64c41400ed5e2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let dataStore = { cl: [], ve: [] };

  // NAVEGACIÓN
  window.go = (id, el) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  };

  window.showMod = (id) => document.getElementById(id).classList.add('active');
  window.closeMod = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));

  // GUARDAR
  window.saveCli = async () => {
    const d = {
      nombre: document.getElementById('c-nom').value,
      empresa: document.getElementById('c-emp').value,
      tel: document.getElementById('c-tel').value,
      ciu: document.getElementById('c-ciu').value,
      not: document.getElementById('c-not').value
    };
    if(!d.nombre) return alert("Nombre obligatorio");
    await addDoc(collection(db, "clientes"), d);
    closeMod();
    showToast("✅ Cliente guardado");
  };

  function showToast(m) {
    const t = document.getElementById('toast'); t.textContent = m;
    t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000);
  }

  // --- MOTOR DE PDF MEJORADO PARA MÓVIL ---
  window.downloadPDF = async (id) => {
    const c = dataStore.cl.find(x => x.id === id);
    const { jsPDF } = window.jspdf;
    const docPdf = new jsPDF();

    showToast("Generando PDF...");

    docPdf.setFont("helvetica", "bold");
    docPdf.text("NJ DESIGN PRINT", 20, 20);
    docPdf.setFont("helvetica", "normal");
    docPdf.setFontSize(10);
    docPdf.text("Resumen de Cliente", 20, 28);
    
    docPdf.autoTable({
      startY: 35,
      head: [['Concepto', 'Detalle']],
      body: [
        ['Nombre', c.nombre],
        ['Empresa', c.empresa || '---'],
        ['WhatsApp', c.tel || '---'],
        ['Ciudad', c.ciu || '---'],
        ['Notas', c.not || '---']
      ],
      theme: 'grid',
      headStyles: { fillColor: [184, 255, 0], textColor: [0,0,0] }
    });

    // En móviles, 'save' es mucho más confiable que 'open' o 'print'
    docPdf.save(`NJ-Resumen-${c.nombre.replace(/\s+/g, '-')}.pdf`);
    showToast("✅ Descargado");
  };

  // REALTIME
  onSnapshot(collection(db, "clientes"), s => {
    dataStore.cl = s.docs.map(d => ({...d.data(), id: d.id}));
    document.getElementById('s-cl').textContent = dataStore.cl.length;
    document.getElementById('t-clientes').innerHTML = dataStore.cl.map(c => `
      <tr>
        <td><b>${c.nombre}</b><br><small>${c.empresa || ''}</small></td>
        <td><a href="https://wa.me/${c.tel}" style="color:var(--brand); text-decoration:none;">${c.tel}</a></td>
        <td><button class="btn btn-pdf" onclick="downloadPDF('${c.id}')">PDF</button></td>
        <td><button onclick="deleteDoc(doc(db,'clientes','${c.id}'))" style="background:none; border:none; color:red;">🗑️</button></td>
      </tr>`).join('');
  });
</script>
</body>
</html>
