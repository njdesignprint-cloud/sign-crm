<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NJ Design Print | Premium CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
  :root {
    --brand: #b8ff00; --bg: #0c0c0e; --side: #141417; --card: #1a1a1e;
    --border: rgba(255,255,255,0.08); --text: #e2e2e7; --muted: #8a8a93;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

  /* --- LAYOUT RESPONSIVO --- */
  .app { display: flex; height: 100vh; flex-direction: row; }
  @media (max-width: 768px) { .app { flex-direction: column; } }

  /* SIDEBAR / NAV */
  .sidebar { 
    width: 240px; background: var(--side); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0;
  }
  @media (max-width: 768px) { 
    .sidebar { width: 100%; height: 70px; flex-direction: row; padding: 10px; order: 2; border-right: none; border-top: 1px solid var(--border); justify-content: space-around; }
    .brand { display: none; }
  }

  .brand { margin-bottom: 40px; font-size: 12px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; text-align: center; }
  .brand span { color: var(--brand); }

  .nav-item { 
    padding: 14px 16px; border-radius: 10px; cursor: pointer; color: var(--muted);
    font-size: 13px; font-weight: 500; transition: 0.2s; margin-bottom: 5px;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--brand); background: rgba(184,255,0,0.08); }

  /* MAIN CONTENT */
  .main { flex: 1; overflow-y: auto; padding: 40px; }
  @media (max-width: 768px) { .main { padding: 20px; padding-bottom: 90px; } }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
  .page-title h2 { font-size: 24px; font-weight: 600; }

  /* TABLAS Y CARDS */
  .card-table { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { text-align: left; padding: 16px; font-size: 11px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
  
  /* BOTONES */
  .btn { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; white-space: nowrap; }
  .btn-primary { background: var(--brand); color: #000; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-pdf { background: #ff4757; color: white; padding: 5px 10px; font-size: 11px; }

  /* MODALES REFORZADOS */
  .modal-overlay { 
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); 
    backdrop-filter: blur(8px); z-index:100; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--side); border: 1px solid var(--border); width: 100%; max-width: 750px; border-radius: 20px; padding: 30px; max-height: 90vh; overflow-y: auto; }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
  .input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; font-size: 14px; }
  .input:focus { border-color: var(--brand); outline: none; }

  .page { display:none; } .page.active { display:block; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #toast { position: fixed; top: 20px; right: 20px; background: var(--brand); color: #000; padding: 15px 25px; border-radius: 10px; font-weight: 700; display: none; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<div id="toast">Acción Exitosa</div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">NJ <span>Design Print</span></div>
    <nav style="display: contents;">
      <div class="nav-item active" onclick="go('dash', this)">📊 <span>Inicio</span></div>
      <div class="nav-item" onclick="go('clientes', this)">👥 <span>Clientes</span></div>
      <div class="nav-item" onclick="go('ventas', this)">💰 <span>Ventas</span></div>
    </nav>
  </aside>

  <main class="main">
    <div id="p-dash" class="page active">
      <div class="header"><div class="page-title"><h2>Panel General</h2><p id="fecha-actual" style="color:var(--muted); font-size:12px;"></p></div></div>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
        <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border);">
            <p style="font-size:11px; color:var(--muted);">CLIENTES TOTALES</p>
            <h3 id="s-cl" style="font-size:30px; color:var(--brand);">0</h3>
        </div>
      </div>
    </div>

    <div id="p-clientes" class="page">
      <div class="header">
        <div class="page-title"><h2>Directorio</h2></div>
        <button class="btn btn-primary" onclick="openModalCli()">+ Nuevo Cliente</button>
      </div>
      <div class="card-table">
        <table>
          <thead><tr><th>Cliente / Empresa</th><th>WhatsApp</th><th>Ciudad</th><th>Resumen</th><th>Acciones</th></tr></thead>
          <tbody id="t-clientes"></tbody>
        </table>
      </div>
    </div>

    <div id="p-ventas" class="page">
      <div class="header"><h2>Cotizaciones</h2><button class="btn btn-primary" onclick="openModalVen()">+ Nueva Venta</button></div>
      <div class="card-table">
        <table>
          <thead><tr><th>Cliente</th><th>Proyecto</th><th>Monto</th><th>Estado</th><th>Acción</th></tr></thead>
          <tbody id="t-ventas"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="m-cli">
  <div class="modal">
    <h3 id="m-cli-title">Ficha de Cliente</h3>
    <div class="form-grid">
      <div class="field"><label>Nombre del Contacto</label><input id="c-nom" class="input"></div>
      <div class="field"><label>Empresa</label><input id="c-emp" class="input"></div>
      <div class="field"><label>WhatsApp</label><input id="c-tel" class="input"></div>
      <div class="field"><label>Email</label><input id="c-mail" class="input"></div>
      <div class="field"><label>Ciudad</label><input id="c-ciu" class="input"></div>
      <div class="field"><label>Dirección</label><input id="c-dir" class="input"></div>
      <div class="field" style="grid-column: 1 / -1;"><label>Notas / RFC</label><textarea id="c-not" class="input" style="height:60px"></textarea></div>
    </div>
    <div style="margin-top:30px; display:flex; justify-content:flex-end; gap:10px;">
      <button class="btn btn-outline" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCli()">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAAf9HnAJppIMUx3cz2RdrR2dkgLx8InSI",
    authDomain: "sign-crm-a7bda.firebaseapp.com",
    projectId: "sign-crm-a7bda",
    storageBucket: "sign-crm-a7bda.firebasestorage.app",
    messagingSenderId: "404561016263",
    appId: "1:404561016263:web:ae655261c64c41400ed5e2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let cache = { cl: [], ve: [] };
  let editingId = null;

  // NAVEGACIÓN
  window.go = (id, el) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  };

  // MODALES
  window.openModalCli = () => {
    editingId = null;
    document.getElementById('m-cli-title').textContent = "Nuevo Cliente";
    document.querySelectorAll('.input').forEach(i => i.value = "");
    document.getElementById('m-cli').classList.add('active');
  };
  window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));

  // NOTIFICACIONES
  const toast = (m) => {
    const t = document.getElementById('toast'); t.textContent = m;
    t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
  };

  // CRUD CLIENTES
  window.saveCli = async () => {
    const d = {
      nombre: document.getElementById('c-nom').value,
      empresa: document.getElementById('c-emp').value,
      tel: document.getElementById('c-tel').value,
      mail: document.getElementById('c-mail').value,
      ciu: document.getElementById('c-ciu').value,
      dir: document.getElementById('c-dir').value,
      not: document.getElementById('c-not').value
    };
    if(!d.nombre) return alert("Nombre requerido");
    
    if(editingId) await updateDoc(doc(db, "clientes", editingId), d);
    else await addDoc(collection(db, "clientes"), d);
    
    closeModals(); toast("Cliente Guardado");
  };

  window.editCli = (id) => {
    const c = cache.cl.find(x => x.id === id);
    editingId = id;
    document.getElementById('c-nom').value = c.nombre;
    document.getElementById('c-emp').value = c.empresa;
    document.getElementById('c-tel').value = c.tel;
    document.getElementById('c-mail').value = c.mail;
    document.getElementById('c-ciu').value = c.ciu;
    document.getElementById('c-dir').value = c.dir;
    document.getElementById('c-not').value = c.not;
    document.getElementById('m-cli').classList.add('active');
  };

  // --- FUNCIÓN PDF ---
  window.printResumen = async (id) => {
    const c = cache.cl.find(x => x.id === id);
    const { jsPDF } = window.jspdf;
    const docPdf = new jsPDF();

    // Estilo PDF
    docPdf.setFont("helvetica", "bold");
    docPdf.setFontSize(20);
    docPdf.text(`NJ DESIGN PRINT - RESUMEN`, 20, 20);
    
    docPdf.setFontSize(12);
    docPdf.text(`Cliente: ${c.nombre}`, 20, 35);
    docPdf.text(`Empresa: ${c.empresa || 'N/A'}`, 20, 42);
    docPdf.text(`WhatsApp: ${c.tel}`, 20, 49);
    docPdf.text(`Ciudad: ${c.ciu}`, 20, 56);
    docPdf.text(`Notas: ${c.not || 'Sin notas'}`, 20, 63);

    docPdf.line(20, 70, 190, 70);
    docPdf.text("HISTORIAL DE TRABAJOS / COTIZACIONES", 20, 80);

    // Buscar ventas del cliente
    const vts = cache.ve.filter(v => v.cliente === (c.empresa || c.nombre));
    
    const rows = vts.map(v => [v.trabajo || v.desc, `$${v.monto || v.precioVenta}`, v.estado]);
    
    docPdf.autoTable({
      startY: 85,
      head: [['Descripción', 'Monto', 'Estado']],
      body: rows,
      headStyles: { fillColor: [184, 255, 0], textColor: [0,0,0] }
    });

    docPdf.save(`Resumen_${c.nombre}.pdf`);
  };

  // LISTENERS
  onSnapshot(collection(db, "clientes"), s => {
    cache.cl = s.docs.map(d => ({...d.data(), id: d.id}));
    document.getElementById('s-cl').textContent = cache.cl.length;
    document.getElementById('t-clientes').innerHTML = cache.cl.map(c => `
      <tr>
        <td><b>${c.nombre}</b><br><small style="color:var(--muted)">${c.empresa}</small></td>
        <td>${c.tel}</td>
        <td>${c.ciu}</td>
        <td><button class="btn btn-pdf" onclick="printResumen('${c.id}')">🖨️ PDF</button></td>
        <td>
          <button style="background:none; border:none; cursor:pointer;" onclick="editCli('${c.id}')">✏️</button>
          <button style="background:none; border:none; cursor:pointer; margin-left:10px;" onclick="deleteDoc(doc(db,'clientes','${c.id}'))">🗑️</button>
        </td>
      </tr>`).join('');
  });

  onSnapshot(collection(db, "cotizaciones"), s => {
    cache.ve = s.docs.map(d => ({...d.data(), id: d.id}));
    document.getElementById('t-ventas').innerHTML = cache.ve.map(v => `
      <tr>
        <td>${v.cliente}</td><td>${v.trabajo || v.desc}</td>
        <td>$${(v.monto || v.precioVenta || 0).toLocaleString()}</td>
        <td>${v.estado}</td>
        <td>---</td>
      </tr>`).join('');
  });

  document.getElementById('fecha-actual').textContent = new Date().toLocaleDateString();

</script>
</body>
</html>
