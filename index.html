<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NJ Design Print | CRM Maestro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
  :root {
    --brand: #b8ff00; --bg: #0c0c0e; --side: #141417; --card: #1a1a1e;
    --border: rgba(255,255,255,0.1); --text: #e2e2e7; --muted: #8a8a93;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

  /* NAVEGACIÓN RESPONSIVA */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
  
  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: 70px; position: fixed; bottom: 0; flex-direction: row; padding: 0; border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 1000; background: var(--side); }
    .brand { display: none; }
    .main { padding: 20px 15px 100px 15px !important; }
  }

  .brand { margin-bottom: 40px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; text-align: center; }
  .brand span { color: var(--brand); }
  .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .nav-item.active { color: var(--brand); background: rgba(184,255,0,0.1); }

  /* CONTENIDO */
  .main { flex: 1; padding: 40px; }
  .header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  
  .card-table { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow-x: auto; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { text-align: left; padding: 15px; font-size: 11px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 15px; font-size: 13px; border-bottom: 1px solid var(--border); }

  /* BOTONES */
  .btn { padding: 10px 18px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
  .btn-primary { background: var(--brand); color: #000; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-pdf { background: #333; color: var(--brand); border: 1px solid var(--brand); font-size: 10px; padding: 5px 10px; margin-right: 5px; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; }

  /* MODALES */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--side); width: 100%; max-width: 650px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
  
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .full { grid-column: 1 / -1; }
  .input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; font-size: 16px; }

  .status-pill { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }

  .page { display:none; } .page.active { display:block; }
  #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--brand); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 700; z-index: 3000; display: none; }
</style>
</head>
<body>

<div id="toast">Cargando...</div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">NJ <span>Design Print</span></div>
    <div class="nav-item active" onclick="go('dash', this)">🏠 <span>Dash</span></div>
    <div class="nav-item" onclick="go('clientes', this)">👥 <span>Clientes</span></div>
    <div class="nav-item" onclick="go('estimados', this)">💰 <span>Estimados</span></div>
  </aside>

  <main class="main">
    <div id="p-dash" class="page active">
      <div class="header"><h2>Resumen</h2></div>
      <div style="background:var(--card); padding:25px; border-radius:15px; border:1px solid var(--border); max-width: 300px;">
        <p style="color:var(--muted); font-size:11px;">UTILIDAD APROBADA</p>
        <h1 id="stat-profit" style="color:var(--brand); font-size:35px;">$0.00</h1>
      </div>
    </div>

    <div id="p-clientes" class="page">
      <div class="header"><h2>Clientes</h2><button class="btn btn-primary" onclick="openCliMod()">+ Nuevo Cliente</button></div>
      <div class="card-table">
        <table>
          <thead><tr><th>Cliente</th><th>Info</th><th>PDFs</th><th>Acciones</th></tr></thead>
          <tbody id="t-clientes"></tbody>
        </table>
      </div>
    </div>

    <div id="p-estimados" class="page">
      <div class="header"><h2>Estimados</h2><button class="btn btn-primary" onclick="openEstMod()">+ Nuevo Estimado</button></div>
      <div class="card-table">
        <table>
          <thead><tr><th>Cliente</th><th>Proyecto</th><th>Venta</th><th>Estado</th><th>PDF</th><th>Acciones</th></tr></thead>
          <tbody id="t-estimados"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="m-cli">
  <div class="modal">
    <h3 id="cli-title">Ficha Cliente</h3><br>
    <div class="form-grid">
      <input id="c-nom" class="input" placeholder="Nombre">
      <input id="c-emp" class="input" placeholder="Empresa">
      <input id="c-tel" class="input" placeholder="WhatsApp">
      <input id="c-mail" class="input" placeholder="Email">
      <input id="c-ciu" class="input" placeholder="Ciudad">
      <input id="c-rfc" class="input" placeholder="RFC / Dirección">
      <textarea id="c-not" class="input full" placeholder="Notas adicionales..." style="height:80px"></textarea>
    </div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeMod()">Cerrar</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveCli()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="m-est">
  <div class="modal">
    <h3 id="est-title">Nuevo Estimado</h3><br>
    <select id="e-cli" class="input"></select>
    <input id="e-job" class="input" placeholder="Nombre del Trabajo">
    <div id="mat-list" style="margin: 15px 0;"></div>
    <button class="btn btn-outline" onclick="addMatRow()" style="font-size:10px">+ Fila Material</button>
    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-top:15px;">
        <div style="display:flex; justify-content:space-between"><span>Precio Venta:</span><input type="number" id="e-price" oninput="calc()" style="width:100px; background:none; border:none; border-bottom:1px solid var(--brand); color:white; text-align:right"></div>
        <div style="display:flex; justify-content:space-between; margin-top:10px; color:var(--brand); font-weight:700"><span>Utilidad:</span><span id="res-profit">$0.00</span></div>
    </div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeMod()">Cerrar</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEst()">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAAf9HnAJppIMUx3cz2RdrR2dkgLx8InSI",
    authDomain: "sign-crm-a7bda.firebaseapp.com",
    projectId: "sign-crm-a7bda",
    storageBucket: "sign-crm-a7bda.firebasestorage.app",
    messagingSenderId: "404561016263",
    appId: "1:404561016263:web:ae655261c64c41400ed5e2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let cache = { cl: [], est: [] };
  let editIdCli = null, editIdEst = null;

  window.go = (id, el) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  };
  window.closeMod = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));

  // --- CLIENTES ---
  window.openCliMod = () => { editIdCli=null; document.getElementById('m-cli').classList.add('active'); document.querySelectorAll('#m-cli input, #m-cli textarea').forEach(i=>i.value=''); };
  window.saveCli = async () => {
    const d = { nombre:document.getElementById('c-nom').value, empresa:document.getElementById('c-emp').value, tel:document.getElementById('c-tel').value, mail:document.getElementById('c-mail').value, ciu:document.getElementById('c-ciu').value, rfc:document.getElementById('c-rfc').value, not:document.getElementById('c-not').value };
    if(editIdCli) await updateDoc(doc(db,"clientes",editIdCli), d); else await addDoc(collection(db,"clientes"), d);
    closeMod(); toast("Guardado");
  };
  window.editCli = (id) => {
    const c = cache.cl.find(x=>x.id===id); editIdCli=id;
    document.getElementById('c-nom').value=c.nombre; document.getElementById('c-emp').value=c.empresa; document.getElementById('c-tel').value=c.tel;
    document.getElementById('c-mail').value=c.mail; document.getElementById('c-ciu').value=c.ciu; document.getElementById('c-rfc').value=c.rfc;
    document.getElementById('c-not').value=c.not; document.getElementById('m-cli').classList.add('active');
  };

  // --- ESTIMADOS ---
  window.openEstMod = () => {
    editIdEst=null; document.getElementById('e-cli').innerHTML = cache.cl.map(c=>`<option>${c.empresa||c.nombre}</option>`).join('');
    document.getElementById('mat-list').innerHTML=''; addMatRow(); document.getElementById('m-est').classList.add('active');
  };
  window.addMatRow = (n='',q='',p='') => {
    const d = document.createElement('div'); d.style.display='grid'; d.style.gridTemplateColumns='2fr 1fr 1fr 30px'; d.style.gap='5px'; d.style.marginBottom='5px';
    d.innerHTML = `<input placeholder="Mat." class="input m-n" value="${n}"><input type="number" placeholder="Cant" class="input m-q" oninput="calc()" value="${q}"><input type="number" placeholder="$" class="input m-p" oninput="calc()" value="${p}"><button onclick="this.parentElement.remove();calc()" style="color:red;background:none;border:none">✕</button>`;
    document.getElementById('mat-list').appendChild(d);
  };
  window.calc = () => {
    let cost = 0; document.querySelectorAll('.m-q').forEach((q,i)=>{ cost += (Number(q.value)*Number(document.querySelectorAll('.m-p')[i].value)); });
    const v = Number(document.getElementById('e-price').value);
    document.getElementById('res-profit').textContent=`$${(v-cost).toFixed(2)}`;
    return {cost, profit:v-cost};
  };
  window.saveEst = async () => {
    const {cost, profit} = calc();
    const mats = Array.from(document.querySelectorAll('#mat-list div')).map(r=>({n:r.querySelector('.m-n').value, q:r.querySelector('.m-q').value, p:r.querySelector('.m-p').value}));
    const d = { cliente:document.getElementById('e-cli').value, trabajo:document.getElementById('e-job').value, costo:cost, venta:Number(document.getElementById('e-price').value), ganancia:profit, materiales:mats, estado:'Pendiente' };
    if(editIdEst) await updateDoc(doc(db,"cotizaciones",editIdEst), d); else await addDoc(collection(db,"cotizaciones"), d);
    closeMod(); toast("Estimado Guardado");
  };
  window.approveEst = async (id) => { if(confirm("¿Marcar como APROBADO?")) await updateDoc(doc(db,"cotizaciones",id), {estado:'Aprobado'}); };

  // --- SISTEMA DE PDF SEPARADO ---
  const { jsPDF } = window.jspdf;

  // 1. PDF SOLO CLIENTE
  window.pdfSoloCliente = (id) => {
    const c = cache.cl.find(x=>x.id===id);
    const docPdf = new jsPDF();
    docPdf.setFontSize(18); docPdf.text("FICHA TÉCNICA DE CLIENTE", 20, 20);
    docPdf.setFontSize(11);
    docPdf.text(`Nombre: ${c.nombre}`, 20, 35);
    docPdf.text(`Empresa: ${c.empresa}`, 20, 42);
    docPdf.text(`WhatsApp: ${c.tel}`, 20, 49);
    docPdf.text(`Email: ${c.mail}`, 20, 56);
    docPdf.text(`Ciudad: ${c.ciu}`, 20, 63);
    docPdf.text(`RFC/Dir: ${c.rfc}`, 20, 70);
    docPdf.text(`Notas: ${c.not}`, 20, 80, { maxWidth: 170 });
    docPdf.save(`Cliente_${c.nombre}.pdf`);
  };

  // 2. PDF SOLO ESTIMADO
  window.pdfSoloEstimado = (id) => {
    const e = cache.est.find(x=>x.id===id);
    const docPdf = new jsPDF();
    docPdf.setFontSize(16); docPdf.text("DETALLE DE ESTIMADO: " + e.trabajo, 20, 20);
    docPdf.setFontSize(10); docPdf.text(`Cliente: ${e.cliente}`, 20, 30);
    docPdf.autoTable({ startY:35, head:[['Material','Cant','P. Unit','Total']], body:e.materiales.map(m=>[m.n, m.q, `$${m.p}`, `$${m.q*m.p}`]), headStyles:{fillColor:[184,255,0], textColor:0} });
    docPdf.text(`VENTA TOTAL: $${e.venta}`, 20, docPdf.lastAutoTable.finalY + 10);
    docPdf.save(`Estimado_${e.trabajo}.pdf`);
  };

  // 3. PDF GENERAL (TODO JUNTO)
  window.pdfGeneralCliente = (id) => {
    const c = cache.cl.find(x=>x.id===id);
    const vts = cache.est.filter(e=>e.cliente===(c.empresa||c.nombre));
    const docPdf = new jsPDF();
    docPdf.setFontSize(18); docPdf.text("REPORTE MAESTRO: " + c.nombre, 20, 20);
    docPdf.setFontSize(10); docPdf.text(`Contacto: ${c.tel} | Ciudad: ${c.ciu}`, 20, 30);
    docPdf.text("HISTORIAL COMPLETO DE TRABAJOS:", 20, 45);
    docPdf.autoTable({ startY:50, head:[['Proyecto','Inversión','Venta','Estado']], body:vts.map(v=>[v.trabajo, `$${v.costo}`, `$${v.venta}`, v.estado]), headStyles:{fillColor:[0,0,0], textColor:255} });
    docPdf.save(`General_${c.nombre}.pdf`);
  };

  function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }

  onSnapshot(collection(db, "clientes"), s => {
    cache.cl = s.docs.map(d => ({...d.data(), id: d.id}));
    document.getElementById('t-clientes').innerHTML = cache.cl.map(c => `<tr><td><b>${c.nombre}</b><br><small>${c.empresa}</small></td><td>${c.tel}</td><td><button class="btn btn-pdf" onclick="pdfSoloCliente('${c.id}')">PDF INFO</button><button class="btn btn-primary" style="font-size:10px" onclick="pdfGeneralCliente('${c.id}')">PDF GENERAL</button></td><td><button class="btn-icon" onclick="editCli('${c.id}')">✏️</button><button class="btn-icon" onclick="deleteDoc(doc(db,'clientes','${c.id}'))">🗑️</button></td></tr>`).join('');
  });

  onSnapshot(collection(db, "cotizaciones"), s => {
    cache.est = s.docs.map(d => ({...d.data(), id: d.id}));
    document.getElementById('stat-profit').textContent = `$${cache.est.filter(e=>e.estado==='Aprobado').reduce((a,b)=>a+b.ganancia,0).toLocaleString()}`;
    document.getElementById('t-estimados').innerHTML = cache.est.map(e => `<tr><td>${e.cliente}</td><td>${e.trabajo}</td><td>$${e.venta}</td><td><span class="status-pill" style="background:${e.estado==='Aprobado'?'#b8ff00':'#333'};color:${e.estado==='Aprobado'?'#000':'#fff'}">${e.estado}</span></td><td><button class="btn-icon" onclick="pdfSoloEstimado('${e.id}')">📄 PDF</button></td><td><button class="btn-icon" onclick="approveEst('${e.id}')">✔️</button><button class="btn-icon" onclick="deleteDoc(doc(db,'cotizaciones','${e.id}'))">🗑️</button></td></tr>`).join('');
  });
</script>
</body>
</html>
