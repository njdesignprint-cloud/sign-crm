<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NJ Design Print | Premium Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #b8ff00; 
    --bg: #0c0c0e;
    --side: #141417;
    --card: #1a1a1e;
    --border: rgba(255,255,255,0.06);
    --text: #e2e2e7;
    --muted: #8a8a93;
    --font: 'Inter', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; height: 100vh; }
  .app { display: flex; height: 100vh; }

  /* --- NAVIGATION --- */
  .sidebar { 
    width: 250px; background: var(--side); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 40px 20px;
  }
  .brand { margin-bottom: 50px; padding: 0 10px; font-size: 13px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; }
  .brand span { color: var(--brand); }

  .nav-item { 
    padding: 14px 16px; border-radius: 10px; cursor: pointer; color: var(--muted);
    font-size: 13px; font-weight: 500; transition: 0.2s; margin-bottom: 5px;
    display: flex; align-items: center; gap: 12px;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--brand); background: rgba(184,255,0,0.05); }

  /* --- CONTENT --- */
  .main { flex: 1; overflow-y: auto; padding: 50px 60px; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
  .page-title h2 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 16px; }
  .stat-label { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1.2px; font-weight: 700; }
  .stat-val { font-size: 24px; font-weight: 700; margin-top: 10px; color: var(--text); }

  /* --- DATA TABLE --- */
  .card-table { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 18px 24px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 18px 24px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.015); }
  
  .action-btn { background: none; border: none; cursor: pointer; padding: 5px; opacity: 0.4; transition: 0.3s; font-size: 16px; }
  .action-btn:hover { opacity: 1; transform: scale(1.1); }

  /* --- UI ELEMENTS --- */
  .btn { padding: 12px 24px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; }
  .btn-primary { background: var(--brand); color: #000; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  
  .modal-overlay { 
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); 
    backdrop-filter: blur(10px); z-index:100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--side); border: 1px solid var(--border); width: 700px; border-radius: 24px; padding: 45px; position: relative; }
  
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
  .full { grid-column: span 2; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; font-size: 14px; }
  .input:focus { border-color: var(--brand); outline: none; }

  .page { display:none; } .page.active { display:block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  #toast { position: fixed; bottom: 30px; right: 30px; background: var(--brand); color: #000; padding: 14px 28px; border-radius: 12px; font-weight: 700; display: none; z-index: 200; box-shadow: 0 10px 30px rgba(184,255,0,0.2); }
</style>
</head>
<body>

<div id="toast">Notificación</div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">NJ <span>Design Print</span></div>
    <nav>
      <div class="nav-item active" onclick="go('dash', this)">Panel Central</div>
      <div class="nav-item" onclick="go('clientes', this)">Directorio Clientes</div>
      <div class="nav-item" onclick="go('ventas', this)">Ventas & Ordenes</div>
      <div class="nav-item" onclick="go('taller', this)">Producción Taller</div>
    </nav>
  </aside>

  <main class="main">
    <div id="p-dash" class="page active">
      <div class="header">
        <div class="page-title"><h2>Dashboard</h2></div>
      </div>
      <div class="stats">
        <div class="stat-card"><div class="stat-label">Clientes</div><div class="stat-val" id="s-cl">0</div></div>
        <div class="stat-card"><div class="stat-label">Cotizaciones</div><div class="stat-val" id="s-co">0</div></div>
        <div class="stat-card"><div class="stat-label">Producción</div><div class="stat-val" id="s-pr">0</div></div>
        <div class="stat-card"><div class="stat-label">Ventas Totales</div><div class="stat-val" id="s-ve">$0</div></div>
      </div>
    </div>

    <div id="p-clientes" class="page">
      <div class="header">
        <div class="page-title"><h2>Clientes</h2></div>
        <button class="btn btn-primary" onclick="openCliModal()">+ Agregar Cliente</button>
      </div>
      <div class="card-table">
        <table>
          <thead><tr><th>Nombre</th><th>Empresa</th><th>WhatsApp / Tel</th><th>Ciudad</th><th>Acciones</th></tr></thead>
          <tbody id="t-clientes"></tbody>
        </table>
      </div>
    </div>

    <div id="p-ventas" class="page"><div class="header"><h2>Ventas</h2></div></div>
    <div id="p-taller" class="page"><div class="header"><h2>Taller</h2></div></div>
  </main>
</div>

<div class="modal-overlay" id="m-cli">
  <div class="modal">
    <h3 id="m-cli-title">Nuevo Cliente</h3>
    <div class="form-grid">
      <div class="field"><label>Nombre del Contacto</label><input id="c-nom" class="input"></div>
      <div class="field"><label>Nombre de Empresa</label><input id="c-emp" class="input"></div>
      <div class="field"><label>WhatsApp</label><input id="c-wa" class="input" placeholder="+52..."></div>
      <div class="field"><label>Correo Electrónico</label><input id="c-mail" class="input"></div>
      <div class="field"><label>Ciudad</label><input id="c-ciu" class="input"></div>
      <div class="field"><label>Dirección</label><input id="c-dir" class="input"></div>
      <div class="field full"><label>Notas / RFC / Detalles</label><textarea id="c-not" class="input" style="height:60px"></textarea></div>
    </div>
    <div style="margin-top:35px; display:flex; justify-content:flex-end; gap:12px;">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-cli" onclick="saveCli()">Guardar Cliente</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAAf9HnAJppIMUx3cz2RdrR2dkgLx8InSI",
    authDomain: "sign-crm-a7bda.firebaseapp.com",
    projectId: "sign-crm-a7bda",
    storageBucket: "sign-crm-a7bda.firebasestorage.app",
    messagingSenderId: "404561016263",
    appId: "1:404561016263:web:ae655261c64c41400ed5e2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let cache = { cl: [] };
  let editingId = null;

  // --- NAVEGACIÓN ---
  window.go = (id, el) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  };

  const notify = (m) => {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  };

  // --- GESTIÓN MODAL ---
  window.openCliModal = () => {
    editingId = null;
    document.getElementById('m-cli-title').textContent = "Nuevo Cliente";
    document.querySelectorAll('.input').forEach(i => i.value = "");
    document.getElementById('m-cli').classList.add('active');
  };

  window.closeModal = () => document.getElementById('m-cli').classList.remove('active');

  // --- CRUD CLIENTES ---

  window.saveCli = async () => {
    const d = {
      nombre: document.getElementById('c-nom').value,
      empresa: document.getElementById('c-emp').value,
      tel: document.getElementById('c-wa').value,
      mail: document.getElementById('c-mail').value,
      ciu: document.getElementById('c-ciu').value,
      dir: document.getElementById('c-dir').value,
      not: document.getElementById('c-not').value
    };

    if(!d.nombre) return alert("El nombre es obligatorio");

    try {
      if(editingId) {
        await updateDoc(doc(db, "clientes", editingId), d);
        notify("✅ Cliente actualizado");
      } else {
        await addDoc(collection(db, "clientes"), d);
        notify("✅ Cliente guardado");
      }
      closeModal();
    } catch(e) { alert("Error al guardar"); }
  };

  window.editCli = (id) => {
    const c = cache.cl.find(x => x.id === id);
    if(!c) return;
    editingId = id;
    document.getElementById('m-cli-title').textContent = "Editar Cliente";
    document.getElementById('c-nom').value = c.nombre || "";
    document.getElementById('c-emp').value = c.empresa || "";
    document.getElementById('c-wa').value = c.tel || "";
    document.getElementById('c-mail').value = c.mail || "";
    document.getElementById('c-ciu').value = c.ciu || "";
    document.getElementById('c-dir').value = c.dir || "";
    document.getElementById('c-not').value = c.not || "";
    document.getElementById('m-cli').classList.add('active');
  };

  window.deleteCli = async (id) => {
    if(confirm("¿Estás seguro de eliminar este cliente? Esta acción no se puede deshacer.")) {
      await deleteDoc(doc(db, "clientes", id));
      notify("🗑️ Cliente eliminado");
    }
  };

  // --- ESCUCHA EN TIEMPO REAL ---
  onSnapshot(collection(db, "clientes"), s => {
    cache.cl = s.docs.map(d => ({...d.data(), id: d.id}));
    document.getElementById('t-clientes').innerHTML = cache.cl.map(c => `
      <tr>
        <td><b>${c.nombre}</b></td>
        <td>${c.empresa || '—'}</td>
        <td>${c.tel || '—'}</td>
        <td>${c.ciu || '—'}</td>
        <td style="display:flex; gap:10px;">
          <button class="action-btn" onclick="editCli('${c.id}')" title="Editar">✏️</button>
          <button class="action-btn" onclick="deleteCli('${c.id}')" title="Eliminar" style="color:#ff4444">🗑️</button>
        </td>
      </tr>`).join('');
    document.getElementById('s-cl').textContent = cache.cl.length;
  });

</script>
</body>
</html>
