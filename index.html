<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NJ Design Print | ERP Logístico</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY_AQUI&libraries=places"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
  :root { --brand: #b8ff00; --bg: #0c0c0e; --side: #141417; --card: #1a1a1e; --border: rgba(255,255,255,0.1); --text: #e2e2e7; --red: #ff4444; }
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
  body { background: var(--bg); color: var(--text); }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 30px 20px; }
  .main { flex: 1; padding: 40px; }
  .input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 10px; }
  .btn-primary { background: var(--brand); color: #000; padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; }
  .btn-action { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal { background: var(--side); width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
  .card-table { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 15px; border-bottom: 1px solid var(--border); text-align: left; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div style="font-weight:700; color:var(--brand); margin-bottom:30px;">NJ DESIGN PRINT</div>
    <div onclick="go('clientes')" style="cursor:pointer; margin-bottom:15px;">👥 Clientes</div>
    <div onclick="go('estimados')" style="cursor:pointer; margin-bottom:15px;">💰 Estimados</div>
    <div onclick="go('produccion')" style="cursor:pointer;">🛠️ Producción</div>
  </aside>

  <main class="main">
    <div id="p-clientes" class="page">
        <div class="header"><h2>Clientes</h2><button class="btn-primary" onclick="openCliMod()">+ Nuevo</button></div>
        <div class="card-table"><table><thead><tr><th>Cliente</th><th>Teléfono</th><th>Dirección</th><th>PDF</th><th>Acciones</th></tr></thead><tbody id="t-clientes"></tbody></table></div>
    </div>
    </main>
</div>

<div class="modal-overlay" id="m-cli">
  <div class="modal">
    <h3>Datos Cliente</h3>
    <input id="c-nom" class="input" placeholder="Nombre">
    <input id="c-tel" class="input" placeholder="Teléfono">
    <input id="c-dir" class="input" placeholder="Dirección de instalación" onfocus="initAutocomplete()">
    <button class="btn-primary" onclick="saveCli()">Guardar</button>
  </div>
</div>

<script>
  let baseAddress = "6511 Briar Moss Ln, Katy, TX 77449";
  
  function initAutocomplete() {
    const input = document.getElementById('c-dir');
    const autocomplete = new google.maps.places.Autocomplete(input);
  }

  function calculateDistance(dest) {
    const service = new google.maps.DistanceMatrixService();
    service.getDistanceMatrix({
      origins: [baseAddress],
      destinations: [dest],
      travelMode: 'DRIVING',
    }, (response, status) => {
      if (status == 'OK') {
        const dist = response.rows[0].elements[0].distance.text;
        alert("Distancia desde tu base: " + dist);
        // Aquí puedes guardar 'dist' en tu base de datos si deseas
      }
    });
  }
</script>
</body>
</html>
